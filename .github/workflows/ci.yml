name: Deploy API

on:
    push:
        branches: [main]
        # paths:
        #     - "bet_backend/**" # only deploy when backend code changes

jobs:
    deploy:
        name: Deploy to DigitalOcean
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up SSH
              run: |
                  mkdir -p ~/.ssh
                  touch ~/.ssh/bet
                  touch ~/.ssh/bet.pub
                  touch ~/.ssh/known_hosts
                  echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/bet
                  echo "${{ secrets.DROPLET_SSH_PUBLIC_KEY }}" > ~/.ssh/bet.pub
                  ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts
                  ssh-copy-id -i ${{ secrets.DROPLET_SSH_PUBLIC_KEY }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}
                  ${{ secrets.BET_SSH_PASSPHRASE }}
            - name: Deploy to droplet
              run: |
                  ssh -i ${{ secrets.BET_SSH_KEY }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}
                  ${{ secrets.BET_SSH_PASSPHRASE }}  
                        # echo "${{ secrets.DROPLET_SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
                        # chmod 700 ~/.ssh
                        # chmod 600 ~/.ssh/authorized_keys
                        # cd /root/bet &&
                        # git pull origin main &&
                        # go build -o api ./bet_backend/main.go &&
                        # sudo systemctl restart api
                      '

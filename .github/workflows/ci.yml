name: Deploy API

on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy to DigitalOcean
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/bet
                  chmod 600 ~/.ssh/bet
                  ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

            - name: Deploy to droplet
              run: |
                  ssh -o StrictHostKeyChecking=no -i ~/.ssh/bet root@${{ secrets.DROPLET_IP }} '
                    cd /root/bet &&
                    git pull origin main &&
                    cd bet_backend &&
                    go mod download &&
                    go build -o api . &&
                    sudo systemctl restart api
                  '

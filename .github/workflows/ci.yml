# .github/workflows/refresh-db.yml
name: Refresh DB

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * *" # 9:00 AM UTC daily
  workflow_dispatch:
    inputs:
      load_type:
        description: "Full load or incremental loading of data"
        required: false
        default: "--incremental"
        type: choice
        options:
          - "--incremental"
          - "--full"

jobs:
  run-r:
    name: Refresh DB
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"

      - name: Install dependencies
        run: |
          sudo apt-get install -y libpq-dev libcurl4-openssl-dev libssl-dev
          Rscript -e "install.packages(c('hoopR', 'dplyr', 'DBI', 'RPostgres'))"

      - name: Run R script
        env:
          BET_DATABASE_URL: ${{ secrets.BET_DATABASE_URL }}
        run: |
          Rscript scripts/nba_data_to_db.r \
            "${{ github.event.inputs.load_type || '--incremental' }}"

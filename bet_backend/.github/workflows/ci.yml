# .github/workflows/run-r-script.yml
name: Run R Script

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      load_type:
        description: "Full load or incremental loading of data"
        required: false
        default: "--incremental"
        type: choice
        options:
          - "--incremental"
          - "--full"

jobs:
  run-r:
    name: Run R Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::ggplot2

      - name: Run R script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          Rscript bet/bet_backend/nba_data_to_db.r \
            "${{ github.event.inputs.load_type || '--incremental' }}"
